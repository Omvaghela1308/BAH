# .streamlit/config.toml
# Configuration file for Streamlit server settings and visual theme.

[server]
headless = true
address = "127.0.0.1"
port = 8501
enableCORS = true
enableXsrfProtection = true

[theme]
base = "light"
primaryColor = "#6366F1"
backgroundColor = "#F7FAFA"
secondaryBackgroundColor = "#F8FAFF"
textColor = "#1E293B"
font = "sans serif"
