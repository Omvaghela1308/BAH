# .streamlit/config.toml
# Configuration file for Streamlit server settings and visual theme.

[server]
headless = true
address = "127.0.0.1"
port = 8501
enableCORS = true
enableXsrfProtection = true

[theme]
base = "dark"
primaryColor = "#58a6ff"
backgroundColor = "#0d1117"
secondaryBackgroundColor = "#161b22"
textColor = "#e6edf3"
font = "monospace"
