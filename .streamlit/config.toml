# .streamlit/config.toml
# Configuration file for Streamlit server settings and visual theme.

[server]
headless = true
address = "127.0.0.1"
port = 8501
enableCORS = true
enableXsrfProtection = true

[theme]
base = "light"
primaryColor = "#3B6FE8"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F4F7FC"
textColor = "#1A2540"
font = "sans serif"
